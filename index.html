<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Páginas PBH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8faf8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
        }

        .container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #2d7a3a;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        a {
            display: inline-block;
            background-color: #2d7a3a;
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        a:hover {
            background-color: #1e5a28;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45, 122, 58, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Projetos - Páginas PBH</h1>
        <div class="links">
            <a href="./Jornada Produtiva/">Jornada Produtiva</a>
            <a href="./Feira de Inclusão Produtiva/">Feira de Inclusão Produtiva</a>
        </div>
    </div>
</body>

</html>
